name: release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update
        required: true
        default: stata18-runtime-v18.0.0-1
      source_url:
        description: Upstream Stata 18 Linux media URL
        required: true
        default: https://public.econ.duke.edu/stata/installers/18/Stata18Linux64.tar.gz
      source_sha256:
        description: Expected SHA-256 for the upstream media
        required: true
        default: afc02cda8ed5034ab3343b82cbea7bf2139bff7bb2fc1d59d676a104f037d669
      draft_release:
        description: Publish as draft release
        required: true
        type: boolean
        default: true
  push:
    tags:
      - 'stata18-runtime-v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "source_url=${{ inputs.source_url }}" >> "$GITHUB_OUTPUT"
            echo "source_sha256=${{ inputs.source_sha256 }}" >> "$GITHUB_OUTPUT"
            echo "draft=${{ inputs.draft_release }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "source_url=https://public.econ.duke.edu/stata/installers/18/Stata18Linux64.tar.gz" >> "$GITHUB_OUTPUT"
            echo "source_sha256=afc02cda8ed5034ab3343b82cbea7bf2139bff7bb2fc1d59d676a104f037d669" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release assets in Arch Linux
        shell: bash
        env:
          UPSTREAM_URL: ${{ steps.meta.outputs.source_url }}
          UPSTREAM_SHA256: ${{ steps.meta.outputs.source_sha256 }}
        run: |
          set -euo pipefail
          docker pull archlinux:base-devel
          docker run --rm \
            -e UPSTREAM_URL \
            -e UPSTREAM_SHA256 \
            -v "$PWD:/work" \
            -w /work \
            archlinux:base-devel \
            bash -lc '
              set -euo pipefail
              pacman -Sy --noconfirm archlinux-keyring
              pacman -Syu --noconfirm base-devel git sudo curl python libarchive gtk2
              install -d /etc/sudoers.d
              useradd -m builder
              printf "builder ALL=(ALL) NOPASSWD: ALL\n" > /etc/sudoers.d/builder
              chmod 440 /etc/sudoers.d/builder
              git clone https://aur.archlinux.org/ncurses5-compat-libs.git /tmp/ncurses5-compat-libs
              chown -R builder:builder /tmp/ncurses5-compat-libs /work
              su builder -c "cd /tmp/ncurses5-compat-libs && makepkg -si --noconfirm --skippgpcheck"
              su builder -c "/work/scripts/ci/build-release.sh"
            '

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stata18-release-dist
          path: dist/
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          draft: ${{ steps.meta.outputs.draft == 'true' }}
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/*.pkg.tar.zst
            dist/*.py
            dist/SHA256SUMS.txt
            dist/BUILD-INFO.txt
